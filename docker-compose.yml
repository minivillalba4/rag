services:
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: /bin/sh
    command:
      - -c
      - "ollama pull ${OLLAMA_MODEL:-qwen2.5:7b-instruct} && ollama pull ${EMBED_MODEL:-nomic-embed-text}"
    restart: "no"

  app:
    build: .
    container_name: rag-app
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b-instruct}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      GRADIO_SERVER_NAME: 0.0.0.0
      GRADIO_SERVER_PORT: "7860"
    volumes:
      - ./data:/app/data
    ports:
      - "7860:7860"
    restart: unless-stopped

volumes:
  ollama:
