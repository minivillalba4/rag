services:
  - type: web
    name: rag-cv
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: |
      pip install -r requirements.txt
      python -m scripts.generate_cv_pdf
      python -m scripts.build_index
    startCommand: python app.py
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: EMBED_PROVIDER
        value: huggingface
      - key: HF_EMBED_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_API_KEY
        sync: false
      - key: GRADIO_SERVER_NAME
        value: 0.0.0.0
      - key: GRADIO_SERVER_PORT
        value: "10000"
      - key: DATA_DIR
        value: ./data/sources
      - key: INDEX_DIR
        value: ./data/index
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: "3.12"
